<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Password generator app</title>
    <link rel="stylesheet" href="./main.css" />
    <script src="./main.js" defer></script>
  </head>
  <body>
    <main>
      <section class="password-display wrapper">
        <h1 class="password-display__title">Password Generator</h1>
        <div class="password-display__wrapper">
          <div class="password-display__output">
            <h2
              class="password-display__password"
              id="passwordDisplay"
              aria-live="polite"
              aria-atomic="true"
            >
              P4$5W0rD!
            </h2>
            <div class="password-display__copy-container">
              <p
                class="password-display__copy-message hidden"
                aria-live="polite"
                aria-atomic="true"
              >
                copied
              </p>
              <button
                class="password-display__copy-btn"
                aria-label="copy generated password"
              >
                <svg
                  class="password-display__copy-icon"
                  id="copyIcon"
                  width="21"
                  height="24"
                  viewBox="0 0 21 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M17.909 0.659016L20.341 3.09098C20.763 3.51294 21 4.08523 21 4.68197V17.25C21 18.4926 19.9926 19.5 18.75 19.5H15V21.75C15 22.9926 13.9926 24 12.75 24H2.25C1.00734 24 0 22.9926 0 21.75V6.75C0 5.50734 1.00734 4.5 2.25 4.5H6V2.25C6 1.00734 7.00734 0 8.25 0H16.3181C16.9147 3.12036e-06 17.4871 0.237058 17.909 0.659016ZM2.53126 21.75H12.4687C12.5434 21.75 12.6149 21.7204 12.6677 21.6677C12.7204 21.6149 12.75 21.5434 12.75 21.4687V19.5H8.25C7.00734 19.5 6 18.4926 6 17.25V6.75H2.53126C2.45665 6.75 2.38512 6.77963 2.33238 6.83238C2.27963 6.88512 2.25 6.95665 2.25 7.03126V21.4687C2.25 21.5434 2.27963 21.6149 2.33238 21.6677C2.38512 21.7204 2.45665 21.75 2.53126 21.75ZM18.4687 17.25H8.53126C8.45665 17.25 8.38512 17.2204 8.33238 17.1677C8.27963 17.1149 8.25 17.0434 8.25 16.9687V2.53126C8.25 2.45665 8.27963 2.38512 8.33238 2.33238C8.38512 2.27963 8.45665 2.25 8.53126 2.25H13.5V6.375C13.5 6.99632 14.0036 7.5 14.625 7.5H18.75V16.9687C18.75 17.0434 18.7204 17.1149 18.6677 17.1677C18.6149 17.2204 18.5434 17.25 18.4687 17.25ZM15.75 5.25H18.75V4.7985C18.75 4.76156 18.7427 4.72499 18.7286 4.69086C18.7145 4.65673 18.6937 4.62572 18.6677 4.59961L16.4004 2.33236C16.3476 2.27963 16.2761 2.25 16.2014 2.25H15.75V5.25Z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div class="password-display__options">
            <form class="password-display__form">
              <div class="option-slider">
                <div class="option-slider__header">
                  <label
                    class="password-display__label"
                    for="passwordLengthInput"
                    >Character Length</label
                  >
                  <p class="password-display__value" id="passwordLengthValue">
                    0
                  </p>
                </div>
                <input
                  type="range"
                  min="0"
                  max="20"
                  value="0"
                  class="option-slider__input"
                  id="passwordLengthInput"
                />
              </div>
              <div class="options-checklist">
                <div class="options-checklist__wrapper">
                  <input
                    type="checkbox"
                    id="upperCaseLetters"
                    name="char"
                    value="upperCase"
                    class="options-checklist__input"
                    checked
                  />
                  <label for="upperCaseLetters" class="option-checklist__label"
                    >Include Uppercase Letters</label
                  >
                </div>

                <div class="options-checklist__wrapper">
                  <input
                    type="checkbox"
                    id="lowerCaseLetters"
                    name="char"
                    value="lowerCase"
                    class="options-checklist__input"
                  />
                  <label for="lowerCaseLetters" class="option-checklist__label"
                    >Include Lowercase Letters</label
                  >
                </div>

                <div class="options-checklist__wrapper">
                  <input
                    type="checkbox"
                    id="numbers"
                    name="char"
                    value="numbers"
                    class="options-checklist__input"
                  />
                  <label for="numbers" class="option-checklist__label"
                    >Include Numbers</label
                  >
                </div>

                <div class="options-checklist__wrapper">
                  <input
                    type="checkbox"
                    id="symbols"
                    name="char"
                    value="symbols"
                    class="options-checklist__input"
                  />
                  <label for="symbols" class="option-checklist__label"
                    >Include Symbols</label
                  >
                </div>
              </div>
              <div class="options-strength">
                <h2 class="options-strength__title">Strength</h2>
                <div class="options-strength__display">
                  <p
                    class="options-strength__value"
                    id="strengthValueP"
                    role="status"
                    aria-live="polite"
                  ></p>
                  <div class="options-strength__squares" aria-hidden="true">
                    <span class="options-strength__square"></span
                    ><span class="options-strength__square"></span
                    ><span class="options-strength__square"></span
                    ><span class="options-strength__square"></span>
                  </div>
                </div>
              </div>

              <button
                type="submit"
                class="password-display__generate-btn"
                id="passwordGeneratorBtn"
              >
                <span>Generate</span>

                <svg
                  class="password-display__generate-icon"
                  width="12"
                  height="12"
                  viewBox="0 0 12 12"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M5.10553 12L11.1055 6.00002L5.10553 0L3.84051 1.26501L7.681 5.10547L6.10352e-05 5.10547V6.8946L7.681 6.8946L3.84051 10.735L5.10553 12Z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
