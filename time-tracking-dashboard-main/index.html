<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Time tracking dashboard</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <h1 class="visually-hidden">Time Tracking Report</h1>
    <main>
      <section class="tt-report wrapper">
        <div class="tt-report__dashboard">
          <div class="tt__heading">
            <div class="tt__heading-user">
              <img
                src="./assets/images/image-jeremy.png"
                alt="Jeremy's image"
                width="234"
                height="234"
              />
              <div class="tt__heading-user-content">
                <p>Report for</p>
                <p class="user">Jeremy Robson</p>
              </div>
            </div>
            <div class="tt__heading-btns">
              <button class="tt__heading-btn" id="daily">Daily</button>
              <button class="tt__heading-btn" id="weekly">Weekly</button>
              <button class="tt__heading-btn" id="monthly">Monthly</button>
            </div>
          </div>
          <div class="tt__cards">
            <div class="tt__card work" id="tt__card1">
              <img
                class="tt__card-image"
                src="./assets/images/icon-work.svg"
                alt=""
                width="79"
                height="79"
              />
              <div class="tt__card-content">
                <h3 class="tt__card-content-title">work</h3>
                <img
                  class="tt__card-content-dot"
                  src="./assets/images/icon-ellipsis.svg"
                  alt=""
                  width="21"
                  height="5"
                />
                <p class="tt__card-content-result">10hrs</p>
                <p class="tt__card-content-status-prev">last Week - 36hrs</p>
              </div>
            </div>
            <div class="tt__card play" id="tt__card2">
              <img
                class="tt__card-image"
                src="./assets/images/icon-play.svg"
                alt=""
                width="76"
                height="77"
              />
              <div class="tt__card-content">
                <h3 class="tt__card-content-title">work</h3>
                <img
                  class="tt__card-content-dot"
                  src="./assets/images/icon-ellipsis.svg"
                  alt=""
                  width="21"
                  height="5"
                />
                <p class="tt__card-content-result">10hrs</p>
                <p class="tt__card-content-status-prev">last Week - 36hrs</p>
              </div>
            </div>
            <div class="tt__card study" id="tt__card3">
              <img
                class="tt__card-image"
                src="./assets/images/icon-study.svg"
                alt=""
                width="79"
                height="79"
              />
              <div class="tt__card-content">
                <h3 class="tt__card-content-title">work</h3>
                <img
                  class="tt__card-content-dot"
                  src="./assets/images/icon-ellipsis.svg"
                  alt=""
                  width="21"
                  height="5"
                />
                <p class="tt__card-content-result">10hrs</p>
                <p class="tt__card-content-status-prev">last Week - 36hrs</p>
              </div>
            </div>
            <div class="tt__card exercise" id="tt__card4">
              <img
                class="tt__card-image"
                src="./assets/images/icon-exercise.svg"
                alt=""
                width="81"
                height="85"
              />
              <div class="tt__card-content">
                <h3 class="tt__card-content-title">work</h3>
                <img
                  class="tt__card-content-dot"
                  src="./assets/images/icon-ellipsis.svg"
                  alt=""
                  width="21"
                  height="5"
                />
                <p class="tt__card-content-result">10hrs</p>
                <p class="tt__card-content-status-prev">last Week - 36hrs</p>
              </div>
            </div>
            <div class="tt__card social" id="tt__card5">
              <img
                class="tt__card-image"
                src="./assets/images/icon-social.svg"
                alt=""
                width="75"
                height="100"
              />
              <div class="tt__card-content">
                <h3 class="tt__card-content-title">work</h3>
                <img
                  class="tt__card-content-dot"
                  src="./assets/images/icon-ellipsis.svg"
                  alt=""
                  width="21"
                  height="5"
                />
                <p class="tt__card-content-result">10hrs</p>
                <p class="tt__card-content-status-prev">last Week - 36hrs</p>
              </div>
            </div>
            <div class="tt__card self-care" id="tt__card6">
              <img
                class="tt__card-image"
                src="./assets/images/icon-self-care.svg"
                alt=""

                height="69"
              />

                <h3 class="tt__card-content-title">work</h3>

              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
