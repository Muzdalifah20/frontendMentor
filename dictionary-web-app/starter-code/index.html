<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"

    <a href="#main" class="visually-hidden skip-link">Skip to main content</a>
    <header class="header wrapper">
      <div class="header__content">
        <a href="/starter-code/">
          <img
            src="./assets/images/logo.svg"
            alt="Dictionary Home"
            class="logo"
            width="34"
            height="38"
          />
        </a>

        <div class="header__select">
          <select name="fonts" id="ddFonts" class="dropdown header__dropdown">
            <svg
              class="header__dropdown-svg"
              width="14"
              height="8"
              viewBox="0 0 14 8"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M0.530273 0.530334L6.53027 6.53033L12.5303 0.530334"
                stroke="#A445ED"
                stroke-width="1.5"
              />
            </svg>
            <option value="sans">Sans Serif</option>
            <option value="serif">Serif</option>
            <option value="mono">Mono</option>
          </select>
          <fieldset
            aria-label="theme toggle"
            role="radiogroup"
            class="header__toggle"
          >
            <div class="header__toggle-wrapper">
              <input type="radio" name="theme" id="light" checked />
              <input type="radio" name="theme" id="dark" />
              <span aria-hidden="true" class="header__toggle-background"></span>
              <span aria-hidden="true" class="header__toggle-button"></span>
            </div>
            <svg
              class="header__toggle-svg"
              width="22"
              height="22"
              viewBox="0 0 22 22"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"

                fill-rule="evenodd"
                clip-rule="evenodd"

                stroke="#757575"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </fieldset>
        </div>
      </div>
    </header>
